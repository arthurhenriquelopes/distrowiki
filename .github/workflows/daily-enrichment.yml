# DistroWiki - Daily Data Enrichment (Scrapling)
# Scraping diário leve usando Scrapling (StealthyFetcher)
# Roda todo dia às 4h UTC (1h Brasília)
# Foca em: datas de release, ranking, metadados básicos

name: Daily Data Enrichment

on:
  schedule:
    # Todo dia às 4h UTC (1h da manhã no horário de Brasília)
    - cron: '0 4 * * *'
  
  # Permite rodar manualmente pelo GitHub Actions UI
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limite de distros (vazio = todas)'
        required: false
        type: string
      update_sheet:
        description: 'Atualizar Google Sheets?'
        required: true
        default: true
        type: boolean

jobs:
  daily-scrape:
    name: 🔄 Scraping Diário (Scrapling)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 📋 Log início do job
        run: |
          echo "🚀 Iniciando scraping diário via Scrapling"
          echo "Data: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Trigger: ${{ github.event_name }}"

      - name: 📥 Checkout distrowiki-api
        uses: actions/checkout@v4
        with:
          repository: arthurhenriquelopes/distrowiki-api
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 🎭 Instalar Playwright (para Scrapling StealthyFetcher)
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium
          
      - name: 🔍 Scraping diário de metadados
        env:
          GCP_PRIVATE_KEY: ${{ secrets.GCP_PRIVATE_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
        run: |
          echo "🔍 Iniciando DistroWatch scraping com Scrapling..."
          ARGS="--update-sheet"
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          python scripts/enrich_distrowatch.py $ARGS
          
      - name: 🔄 Invalidar cache da API
        if: success()
        run: |
          curl -s -X GET "${{ secrets.API_BASE_URL }}/distros?force_refresh=true" \
            -H "X-API-Key: ${{ secrets.API_KEY }}" > /dev/null || true
          echo "✅ Cache da API invalidado"

      - name: ✅ Sucesso
        if: success()
        run: |
          echo "========================================" 
          echo "✅ Scraping diário concluído com sucesso!"
          echo "========================================"
          echo "Data: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: ❌ Falha
        if: failure()
        run: |
          echo "========================================" 
          echo "❌ Scraping diário falhou!"
          echo "========================================"
          echo "Data: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Verifique os logs acima para detalhes."
